<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valeo Cab</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://jsdelivr.net">
    <link rel="stylesheet" href="/style.css">
    <!-- Підключаємо офіційний швидкий модуль Supabase з CDN -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1"> Baltic-Valeo Cab </span>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm hidden" onclick="logout()">Вихід</button>
        </div>
    </nav>

    <div class="container mb-5">
        <!-- ЕКРАН ВХОДУ -->
        <div id="loginScreen" class="row justify-content-center">
            <div class="col-md-4 card p-4 text-center mt-5">
                <h3>🔒 Вхід до кабінету</h3>
                <div class="mt-3">
                    <input type="password" id="passwordInput" class="form-control mb-3" placeholder="Введіть особистий пароль">
                    <button class="btn btn-primary w-100" onclick="login()">Увійти</button>
                    <p id="loginError" class="text-danger mt-2 fw-bold hidden">❌ Неправильний пароль!</p>
                </div>
            </div>
        </div>

        <!-- ГОЛОВНА ПАНЕЛЬ (Завантажується статично, спочатку прихована) -->
        <div id="mainDashboard" class="row g-4 hidden">
            <!-- Внесення зміни -->
            <div class="col-md-4">
                <div class="card p-4">
                    <h4>📝 Внесення рапорту за зміну</h4>
                    <div class="mt-3">
                        <label class="form-label">Дата зміни</label>
                        <input type="date" id="formData" class="form-control mb-2">
                        
                        <label class="form-label">Назва лінії</label>
                        <input type="text" id="formLinia" class="form-control mb-2" value="LF74">
                        
                        <label class="form-label">Зміна</label>
                        <select id="formZmiana" class="form-select mb-2">
                            <option value="1">1 зміна</option>
                            <option value="2">2 зміна</option>
                            <option value="3">3 зміна</option>
                        </select>
                        
                        <label class="form-label">Планові години</label>
                        <input type="number" id="formPlan" class="form-control mb-2" value="8">
                        
                        <label class="form-label">Фактичні години</label>
                        <input type="number" id="formFakt" class="form-control mb-3" value="8">
                        
                        <hr>
                        <label class="form-label text-success fw-bold">Перевірено ламп (OK)</label>
                        <input type="number" id="formOk" class="form-control mb-2" value="0">
                        
                        <label class="form-label text-danger fw-bold">Брак (NOK)</label>
                        <input type="number" id="formNok" class="form-control mb-3" value="0">
                        
                        <button class="btn btn-success w-100" onclick="addReport()">Зберегти в базу</button>
                    </div>
                </div>
            </div>
            
            <!-- Таблиця -->
            <div class="col-md-8">
                <div class="card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4>📊 Твої відпрацьовані зміни</h4>
                        <button class="btn btn-outline-primary btn-sm" onclick="downloadExcel()">📥 Скачати Excel</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover table-striped">
                            <thead class="table-dark">
                                <tr>
                                    <th>Дата</th>
                                    <th>Лінія</th>
                                    <th>Зміна</th>
                                    <th>Години</th>
                                    <th>Рапорт деталей</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr><td colspan="5" class="text-center text-muted py-3">Завантаження даних...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- СКРИПТ КЕРУВАННЯ БАЗОЮ ПРЯМО З ТЕЛЕФОНУ -->
    <script>
        // ВСТАВ СЮДИ СВОЇ ДАНІ З SUPABASE
        const SUPABASE_URL = "https://whjflfcqzeksfaaoormw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Ht1Rc32FbyEWwlAgR29u0A_HxxMRsbh";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Перевірка авторизації при завантаженні сторінки
        window.onload = function() {
            if (localStorage.getItem('valeo_auth') === 'true') {
                showDashboard();
            }
        };

        function login() {
            const pass = document.getElementById('passwordInput').value;
            if (pass === 'valeo2026') {
                localStorage.setItem('valeo_auth', 'true');
                showDashboard();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('valeo_auth');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            loadLogs();
        }

        async function loadLogs() {
            const { data, error } = await _supabase.from('work_logs').select('*').order('data', { ascending: false });
            const tbody = document.getElementById('tableBody');
            
            if (error || !data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">База даних порожня.</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(row => `
                <tr>
                    <td>${row.data}</td>
                    <td>${row.linia}</td>
                    <td>${row.zmiana} зміна</td>
                    <td>${row.godziny_fakt} год (Нічні: ${row.godziny_nocne}, Надгодини: ${row.nadgodziny})</td>
                    <td><span class="text-success">OK: ${row.komponenty_ok}</span> / <span class="text-danger">NOK: ${row.komponenty_nok}</span></td>
                </tr>
            `).join('');
        }

        async function addReport() {
            const data = document.getElementById('formData').value;
            const linia = document.getElementById('formLinia').value;
            const zmiana = parseInt(document.getElementById('formZmiana').value);
            const g_plan = parseInt(document.getElementById('formPlan').value) || 8;
            const g_fakt = parseInt(document.getElementById('formFakt').value) || 8;
            const ok = parseInt(document.getElementById('formOk').value) || 0;
            const nok = parseInt(document.getElementById('formNok').value) || 0;

            if (!data) { alert("Оберіть дату!"); return; }

            const nadgodziny = Math.max(0, g_fakt - g_plan);
            const godziny_nocne = zmiana === 3 ? Math.min(8, g_fakt) : 0;

            await _supabase.from('work_logs').upsert({
                data, linia, zmiana, godziny_plan: g_plan, godziny_fakt: g_fakt,
                nadgodziny, godziny_nocne, komponenty_ok: ok, komponenty_nok: nok
            });

            loadLogs();
        }

        async function downloadExcel() {
            // Для статичного Excel підключаємо легку зовнішню бібліотеку в момент кліку
            const script = document.createElement('script');
            script.src = "https://jsdelivr.net";
            document.body.appendChild(script);
            
            script.onload = async function() {
                const { data } = await _supabase.from('work_logs').select('*').order('data', { ascending: false });
                const worksheet = XLSX.utils.json_to_sheet(data || []);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, 'Звіт_Valeo');
                XLSX.writeFile(workbook, "zvit_valeo.xlsx");
            };
        }
    </script>
</body>
</html>
