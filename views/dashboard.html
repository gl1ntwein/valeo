<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valeo Cab - Кабінет</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="navbar mb-4">
    <div class="container-fluid">
      <span class="navbar-brand">Кабінет Valeo</span>
      <a href="/logout" class="btn btn-outline-light btn-sm">Вихід</a>
    </div>
  </nav>

  <main class="container mb-5">
    <section class="card p-4 mb-4">
      <h4>Синхронізація графіка</h4>
      <div class="row align-items-center">
        <div class="col-md-8">
          <input type="text" id="searchName" class="form-control" placeholder="Введіть ПІБ як у графіку" autocomplete="name">
        </div>
        <div class="col-md-4">
          <button id="syncButton" class="btn btn-primary w-100" type="button">Синхронізувати графік</button>
        </div>
      </div>
      <div id="syncStatus" class="mt-2 fw-bold" aria-live="polite"></div>
    </section>

    <div class="row g-4">
      <section class="col-md-4">
        <div class="card p-4">
          <h4>Рапорт за зміну</h4>
          <label class="form-label" for="repData">Дата зміни</label>
          <input type="date" id="repData" class="form-control mb-2" required>

          <label class="form-label" for="repLinia">Лінія</label>
          <input type="text" id="repLinia" class="form-control mb-2" value="LF74" required>

          <label class="form-label" for="repZmiana">Зміна</label>
          <select id="repZmiana" class="form-select mb-2">
            <option value="1">1 зміна</option>
            <option value="2">2 зміна</option>
            <option value="3">3 зміна</option>
          </select>

          <label class="form-label" for="repPlan">Планові години</label>
          <input type="number" id="repPlan" class="form-control mb-2" value="8" min="0" step="0.5">

          <label class="form-label" for="repFakt">Фактичні години</label>
          <input type="number" id="repFakt" class="form-control mb-3" value="8" min="0" step="0.5">

          <hr>

          <label class="form-label text-success" for="repOk">Компоненти OK</label>
          <input type="number" id="repOk" class="form-control mb-2" value="0" min="0">

          <label class="form-label text-danger" for="repNok">Компоненти NOK</label>
          <input type="number" id="repNok" class="form-control mb-3" value="0" min="0">

          <button id="saveReportButton" class="btn btn-success w-100" type="button">Зберегти в базу</button>
          <div id="reportStatus" class="mt-2 fw-bold" aria-live="polite"></div>
        </div>
      </section>

      <section class="col-md-8">
        <div class="card p-4 h-100">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Відпрацьовані зміни</h4>
            <a href="/download_excel" class="btn btn-outline-primary btn-sm">Скачати Excel</a>
          </div>

          <div class="table-responsive">
            <table class="table table-hover table-striped">
              <thead class="table-dark">
                <tr>
                  <th>Дата</th>
                  <th>Лінія</th>
                  <th>Зміна</th>
                  <th>Години</th>
                  <th>Рапорт</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr>
                  <td colspan="5" class="text-center text-muted py-3">Дані завантажаться у фоні.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const tableBody = document.getElementById('tableBody');
      const syncButton = document.getElementById('syncButton');
      const syncStatus = document.getElementById('syncStatus');
      const saveReportButton = document.getElementById('saveReportButton');
      const reportStatus = document.getElementById('reportStatus');

      function escapeText(value) {
        return String(value ?? '').replace(/[&<>"']/g, function (char) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[char];
        });
      }

      async function loadLogs() {
        try {
          const response = await fetch('/api/logs', { cache: 'no-store' });
          const logs = await response.json();

          if (!Array.isArray(logs) || logs.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">База даних порожня.</td></tr>';
            return;
          }

          tableBody.innerHTML = logs.map(function (row) {
            return `
              <tr>
                <td>${escapeText(row.data)}</td>
                <td>${escapeText(row.linia)}</td>
                <td>${escapeText(row.zmiana)} зміна</td>
                <td>${escapeText(row.godziny_fakt)} год (нічні: ${escapeText(row.godziny_nocne)}, надгодини: ${escapeText(row.nadgodziny)})</td>
                <td><span class="text-success">OK: ${escapeText(row.komponenty_ok)}</span> / <span class="text-danger">NOK: ${escapeText(row.komponenty_nok)}</span></td>
              </tr>
            `;
          }).join('');
        } catch (error) {
          tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-3">Не вдалося завантажити дані.</td></tr>';
        }
      }

      async function addReport() {
        const body = {
          data: document.getElementById('repData').value,
          linia: document.getElementById('repLinia').value,
          zmiana: document.getElementById('repZmiana').value,
          godziny_plan: document.getElementById('repPlan').value,
          godziny_fakt: document.getElementById('repFakt').value,
          komponenty_ok: document.getElementById('repOk').value,
          komponenty_nok: document.getElementById('repNok').value,
        };

        if (!body.data) {
          reportStatus.textContent = 'Оберіть дату зміни.';
          reportStatus.className = 'mt-2 fw-bold text-danger';
          return;
        }

        saveReportButton.disabled = true;
        reportStatus.textContent = 'Збереження...';
        reportStatus.className = 'mt-2 fw-bold text-muted';

        try {
          const response = await fetch('/api/add_report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const result = await response.json();

          if (!result.success) throw new Error(result.error || 'Помилка збереження.');

          reportStatus.textContent = 'Зміну збережено.';
          reportStatus.className = 'mt-2 fw-bold text-success';
          loadLogs();
        } catch (error) {
          reportStatus.textContent = error.message;
          reportStatus.className = 'mt-2 fw-bold text-danger';
        } finally {
          saveReportButton.disabled = false;
        }
      }

      async function syncSchedule() {
        const searchName = document.getElementById('searchName').value.trim();
        if (!searchName) {
          syncStatus.textContent = 'Введіть ПІБ.';
          syncStatus.className = 'mt-2 fw-bold text-danger';
          return;
        }

        syncButton.disabled = true;
        syncStatus.textContent = 'Сканування графіка...';
        syncStatus.className = 'mt-2 fw-bold text-muted';

        try {
          const response = await fetch('/api/sync_schedule', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ search_name: searchName }),
          });
          const result = await response.json();

          if (!result.success) throw new Error(result.error || 'Помилка синхронізації.');

          syncStatus.textContent = `Готово. Додано або оновлено змін: ${result.count}.`;
          syncStatus.className = 'mt-2 fw-bold text-success';
          loadLogs();
        } catch (error) {
          syncStatus.textContent = error.message;
          syncStatus.className = 'mt-2 fw-bold text-danger';
        } finally {
          syncButton.disabled = false;
        }
      }

      saveReportButton.addEventListener('click', addReport);
      syncButton.addEventListener('click', syncSchedule);
      window.setTimeout(loadLogs, 0);
    });
  </script>
</body>
</html>
