<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valeo Cab - Вхід</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🏭 Кабінет Valeo</span>
        </div>
    </nav>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4 text-center mt-5">
                <h3>🔒 Вхід до системи</h3>
                <div class="mt-3">
                    <input type="password" id="passwordField" class="form-control mb-3" placeholder="Введіть особистий пароль" required>
                    <!-- МИ ПРИБРАЛИ ONCLICK ЗВІДСИ, ЩОБ УНИКНУТИ ПОМИЛОК -->
                    <button id="loginButton" class="btn btn-primary w-100">Увійти</button>
                    <div id="errorArea" class="text-danger mt-2 fw-bold"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Запускаємо логіку тільки після повного рендерингу сторінки браузером
        document.addEventListener("DOMContentLoaded", function() {
            const loginBtn = document.getElementById('loginButton');
            const passwordField = document.getElementById('passwordField');
            const errorArea = document.getElementById('errorArea');

            if (loginBtn) {
                loginBtn.addEventListener('click', function() {
                    const pass = passwordField.value;
                    errorArea.innerText = "⏳ Перевірка...";
                    
                    fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: pass })
                    })
                    .then(function(res) { return res.json(); })
                    .then(function(data) {
                        if (data.success) { 
                            location.reload(); 
                        } else { 
                            errorArea.innerText = data.error; 
                        }
                    })
                    .catch(function(err) {
                        errorArea.innerText = "❌ Помилка зв'язку з сервером.";
                    });
                });
            }
        });
    </script>
</body>
</html>
